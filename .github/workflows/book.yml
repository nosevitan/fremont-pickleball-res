name: Book Pickleball Court

on:
  schedule:
    - cron: "25 14 * * *"  # 7:25am PT (14:25 UTC during PDT)
  workflow_dispatch:

jobs:
  book:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if booking is enabled
        run: |
          if [ "${{ vars.BOOKING_ENABLED }}" != "true" ]; then
            echo "Booking disabled, skipping"
            exit 0
          fi
          echo "BOOKING_ENABLED=true" >> "$GITHUB_ENV"

      - name: Set up Python 3.11
        if: env.BOOKING_ENABLED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: env.BOOKING_ENABLED == 'true'
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        if: env.BOOKING_ENABLED == 'true'
        run: python -m playwright install chromium --with-deps

      - name: Create .env file
        if: env.BOOKING_ENABLED == 'true'
        run: |
          cat <<EOF > .env
          ACTIVENET_USERNAME=${{ secrets.ACTIVENET_USERNAME }}
          ACTIVENET_PASSWORD=${{ secrets.ACTIVENET_PASSWORD }}
          ACTIVENET_CUSTOMER_ID=${{ secrets.ACTIVENET_CUSTOMER_ID }}
          ACTIVENET_CCV=${{ secrets.ACTIVENET_CCV }}
          EOF

      - name: Run booking script
        id: booking
        if: env.BOOKING_ENABLED == 'true'
        run: |
          if python book.py; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            echo "result=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Save booking result
        if: env.BOOKING_ENABLED == 'true' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT="${{ steps.booking.outputs.result || 'failed' }}"
          DATE=$(python3 -c "from datetime import datetime, timedelta; print((datetime.now() + timedelta(days=7)).strftime('%Y-%m-%d'))")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read the last log line for details
          DETAIL=$(tail -1 logs/book_*.log 2>/dev/null | head -c 200 || echo "No details")

          # Find court and time from logs
          COURT=$(grep -o "BOOKING.*SUCCESSFUL.*" logs/book_*.log 2>/dev/null | tail -1 | head -c 200 || echo "")
          if [ -z "$COURT" ]; then
            COURT=$(grep -o "Court [A-D].*4:00-6:00 PM" logs/book_*.log 2>/dev/null | tail -1 || echo "")
          fi

          gh variable set LAST_BOOKING_RESULT --body "{\"status\":\"$RESULT\",\"date\":\"$DATE\",\"court\":\"$COURT\",\"timestamp\":\"$TIMESTAMP\"}" --repo nosevitan/fremont-pickleball-res

      - name: Scan upcoming bookings
        if: env.BOOKING_ENABLED == 'true' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scan_bookings.py || true

      - name: Upload screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-artifacts
          path: |
            screenshots/
            logs/
          if-no-files-found: ignore
